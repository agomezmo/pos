version: '3.8'

services:
  db:
    image: postgres:15
    container_name: pos_db
    environment:
      POSTGRES_DB: pos_system
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pos_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed_pharmacy.sql:/docker-entrypoint-initdb.d/02-seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pos_api
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: pos_system
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: "SuperSecretKeyForPOS2024!@#$%"
      JWT_EXPIRES_IN: "24h"
      PORT: 4000
      NODE_ENV: production
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: pos_frontend
    ports:
      - "8081:80"
    volumes:
      - ./nginx.conf/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api

volumes:
  pos_data:
