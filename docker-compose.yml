version: '3.8'

services:
  db:
    image: postgres:15
    container_name: pos_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: pos_system
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pos_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed_pharmacy.sql:/docker-entrypoint-initdb.d/02-seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pos_api
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: pos_system
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: "SuperSecretKeyForPOS2024!@#$%"
      JWT_EXPIRES_IN: "24h"
      PORT: 4000
      NODE_ENV: production
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Farmacia}
      WHATSAPP_API_URL: ${WHATSAPP_API_URL:-}
      WHATSAPP_API_TOKEN: ${WHATSAPP_API_TOKEN:-}
    ports:
      - "4000:4000"
    volumes:
      - wa_auth:/app/whatsapp-auth
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: pos_frontend
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./nginx.conf/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api

volumes:
  pos_data:
  wa_auth:
